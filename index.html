

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHealth · Patient Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f1f5f9; }
        .glass { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-active { color: #0ea5e9; position: relative; }
        .nav-active::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 100%; height: 2px; background: #0ea5e9; }
    </style>
</head>
<body class="p-6 md:p-12 bg-sky-300">

<div class="max-w-6xl mx-auto">
    <!-- Header & Navigation -->
    <header class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-sky-500 rounded-2xl flex items-center justify-center text-white text-2xl">📅</div>
            <h1 class="text-xl font-bold">MyHealth</h1>
        </div>
        <nav class="flex gap-8">
            <button data-tab="dashboard" class="nav-btn font-semibold nav-active">Home</button>
            <button data-tab="book" class="nav-btn font-semibold text-slate-500">Book</button>
            <button data-tab="history" class="nav-btn font-semibold text-slate-500">History</button>
        </nav>
    </header>

    <!-- HOME TAB (with search) -->
    <div id="dashboard" class="tab-content active space-y-6">
        <div class="glass p-5 rounded-2xl">
            <input type="text" id="searchInput" placeholder="Search doctor by name or specialty..." class="w-full p-3 rounded-xl bg-white outline-none focus:ring-2 focus:ring-sky-500">
            <div id="liveResults" class="mt-3 space-y-2"></div>
        </div>

        <div class="glass p-6 rounded-3xl">
            <div class="flex justify-between mb-4">
                <h2 class="text-2xl font-bold">Upcoming Appointments</h2>
                <button id="gotoBookBtn" class="text-sky-500 font-bold">+ New</button>
            </div>
            <div id="upcomingList" class="space-y-3"></div>
        </div>
    </div>

    <!-- BOOK TAB (doctor grid + booking form) -->
    <div id="book" class="tab-content space-y-6">
        <h2 class="text-3xl font-bold">All Specialists</h2>
        <div id="doctorGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        <div id="bookingForm" class="hidden glass p-6 rounded-3xl border-2 border-sky-500">
            <h3 class="text-2xl font-bold mb-4">Book with <span id="selectedDoctorName" class="text-sky-500"></span></h3>
            <form id="apptForm">
                <input type="date" id="apptDate" required class="w-full p-3 rounded-xl bg-slate-100 mb-3">
                <select id="apptTime" required class="w-full p-3 rounded-xl bg-slate-100 mb-3">
                    <option>09:00 AM</option><option>10:30 AM</option><option>01:00 PM</option><option>03:30 PM</option>
                </select>
                <textarea id="apptReason" rows="2" placeholder="Reason for visit" class="w-full p-3 rounded-xl bg-slate-100 mb-3"></textarea>
                <div class="flex gap-3">
                    <button type="submit" class="flex-1 bg-sky-500 text-white p-3 rounded-xl font-bold">Confirm</button>
                    <button type="button" id="cancelFormBtn" class="px-6 bg-slate-200 rounded-xl">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- HISTORY TAB -->
    <div id="history" class="tab-content">
        <div class="glass p-6 rounded-3xl">
            <h2 class="text-2xl font-bold mb-4">Past Visits</h2>
            <div id="historyList" class="space-y-3"></div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
