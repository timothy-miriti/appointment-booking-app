<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHealth · Patient Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-active { color: #0ea5e9; position: relative; }
        .nav-active::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 100%; height: 2px; background: #0ea5e9; }
    </style>
</head>
<body class="p-6 md:p-12 bg-gradient-to-br from-violet-200 to-purple-200 min-h-screen">

<div class="max-w-6xl mx-auto">
    <!-- Header -->
    <header class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-sky-500 rounded-2xl flex items-center justify-center text-white shadow-lg text-2xl">📅</div>
            <div>
                <h1 class="text-xl font-bold text-slate-800">MyHealth</h1>
                <p class="text-xs text-slate-500 uppercase tracking-wide">Patient Portal</p>
            </div>
        </div>
        <nav class="hidden md:flex gap-8">
            <button data-tab="dashboard" class="nav-btn font-semibold nav-active">Home</button>
            <button data-tab="book" class="nav-btn font-semibold text-slate-500 hover:text-sky-500 transition">Book</button>
            <button data-tab="history" class="nav-btn font-semibold text-slate-500 hover:text-sky-500 transition">History</button>
        </nav>
    </header>

    <!-- DASHBOARD (HOME) -->
    <div id="dashboard" class="tab-content active space-y-6">
        <div class="bg-white/90 backdrop-blur-md rounded-2xl p-5 shadow-lg border border-white/20">
            <input type="text" id="searchInput" placeholder="Search doctor by name or specialty..." 
                   class="w-full p-3 rounded-xl bg-white border border-slate-200 outline-none focus:ring-2 focus:ring-sky-500 transition">
            <div id="liveResults" class="mt-3 space-y-2"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white/90 backdrop-blur-md rounded-2xl p-5 shadow-lg">
                <p class="text-sky-500 text-sm font-bold uppercase tracking-wide">Next Appointment</p>
                <p id="nextAppt" class="text-xl font-bold mt-1 text-slate-800">None</p>
            </div>
            <div class="bg-white/90 backdrop-blur-md rounded-2xl p-5 shadow-lg">
                <p class="text-emerald-500 text-sm font-bold uppercase tracking-wide">Top Specialists</p>
                <p class="text-sm text-slate-600">Expert care, worldwide</p>
            </div>
            <div class="bg-white/90 backdrop-blur-md rounded-2xl p-5 shadow-lg">
                <p class="text-amber-500 text-sm font-bold uppercase tracking-wide">Completed</p>
                <p id="completedCount" class="text-3xl font-bold text-slate-800">0</p>
            </div>
        </div>

        <div class="bg-white/90 backdrop-blur-md rounded-3xl p-6 shadow-lg">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-slate-800">Upcoming</h2>
                <button id="gotoBookBtn" class="text-sky-500 font-bold hover:underline">+ New</button>
            </div>
            <div id="upcomingList" class="space-y-3"></div>
        </div>
    </div>

    <!-- BOOK TAB -->
    <div id="book" class="tab-content space-y-6">
        <h2 class="text-3xl font-bold text-slate-800">All Specialists</h2>
        <div id="doctorGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        <div id="bookingForm" class="hidden bg-white/90 backdrop-blur-md rounded-3xl p-6 shadow-lg border-2 border-sky-500">
            <h3 class="text-2xl font-bold mb-4 text-slate-800">Book with <span id="selectedDoctorName" class="text-sky-500"></span></h3>
            <form id="apptForm">
                <input type="date" id="apptDate" required class="w-full p-3 rounded-xl bg-slate-100 border border-slate-200 mb-3 outline-none focus:ring-2 focus:ring-sky-500">
                <select id="apptTime" required class="w-full p-3 rounded-xl bg-slate-100 border border-slate-200 mb-3 outline-none focus:ring-2 focus:ring-sky-500">
                    <option>09:00 AM</option><option>10:30 AM</option><option>01:00 PM</option><option>03:30 PM</option>
                </select>
                <textarea id="apptReason" rows="2" placeholder="Reason for visit" class="w-full p-3 rounded-xl bg-slate-100 border border-slate-200 mb-3 outline-none focus:ring-2 focus:ring-sky-500"></textarea>
                <div class="flex gap-3">
                    <button type="submit" class="flex-1 bg-sky-500 text-white p-3 rounded-xl font-bold hover:bg-sky-600 transition">Confirm</button>
                    <button type="button" id="cancelFormBtn" class="px-6 bg-slate-200 text-slate-700 rounded-xl font-bold hover:bg-slate-300 transition">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- HISTORY TAB -->
    <div id="history" class="tab-content">
        <div class="bg-white/90 backdrop-blur-md rounded-3xl p-6 shadow-lg">
            <h2 class="text-2xl font-bold mb-4 text-slate-800">Past Visits</h2>
            <div id="historyList" class="space-y-3"></div>
        </div>
    </div>
</div>

<!-- Toast notification -->
<div id="toast" class="fixed bottom-8 right-8 translate-y-20 opacity-0 transition-all duration-300 pointer-events-none z-50 bg-slate-900 text-white px-5 py-3 rounded-xl shadow-lg"></div>

<script src="script.js"></script>
</body>
</html>
